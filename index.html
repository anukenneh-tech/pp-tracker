<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P/P TRACKER 🌿</title>
    <style>
        :root { --primary: #4caf50; --bg: #f8faf7; --white: #ffffff; --text: #2d3436; --shadow: rgba(0,0,0,0.08); }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.4rem; box-shadow: 0 2px 10px var(--shadow); }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        
        .card { background: var(--white); border-radius: 20px; padding: 18px; margin-bottom: 20px; box-shadow: 0 4px 15px var(--shadow); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        /* יומן מעוצב */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-header button { background: var(--primary); color: white; border: none; padding: 5px 15px; border-radius: 8px; cursor: pointer; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .weekday { font-size: 12px; font-weight: bold; color: #888; padding-bottom: 5px; }
        .day { padding: 12px 0; background: #f9f9f9; border-radius: 10px; font-size: 14px; cursor: pointer; border: 1px solid transparent; }
        .day:hover { border-color: var(--primary); }
        .day.today { background: #e8f5e9; border: 1.5px solid var(--primary); font-weight: bold; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-btn { border: none; background: none; font-size: 12px; color: #a0a0a0; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .item-row { display: flex; flex-direction: column; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .rating { display: flex; justify-content: space-between; gap: 8px; margin-top: 8px; }
        .dot { flex: 1; height: 38px; border: 1.5px solid #e0e0e0; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #fff; }
        .dot.active { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>

<header>P/P TRACKER 🌿</header>
<div class="container" id="view"></div>

<nav class="nav">
    <button class="nav-btn active" onclick="show('track')">📊<span>מעקב</span></button>
    <button class="nav-btn" onclick="show('meds')">💊<span>תרופות</span></button>
    <button class="nav-btn" onclick="show('calendar')">📅<span>יומן</span></button>
    <button class="nav-btn" onclick="show('analysis')">📈<span>ניתוח</span></button>
    <button class="nav-btn" onclick="show('more')">➕<span>עוד</span></button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('pp_final_v7')) || {
        symptoms: {
            physical: ["נזלת", "חום", "כאב רגליים", "כאבי בטן", "כאבי ראש", "כאב גרון", "שיעול", "הליכה רוקעת", "עייפות", "הרחבת אישונים", "אחיזת עפרון רפה", "הרטבת לילה", "יקיצות מרובות", "קושי להירדם"],
            behavior: ["בכי", "התפרצויות זעם", "מתחצפת ומקללת", "מופנמת", "תסכול וכעס", "שצף דיבור", "חוסר ריכוז", "ערפול מוחי", "צחוק היסטרי"],
            compulsive: ["הרמת גבות", "משיכת אף", "כחכוח גרון", "גירוד והרחה", "הקפצת גוף", "משיכת כתפיים", "סידור שיער", "סידור שמיכה", "סידור נעליים", "עניין עם בגדים"]
        },
        meds: [], contacts: [], sites: [], docs: [], logs: {}
    };

    let currDate = new Date();

    function save() { localStorage.setItem('pp_final_v7', JSON.stringify(db)); }

    function show(tab) {
        const v = document.getElementById('view');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');

        if (tab === 'track') {
            v.innerHTML = Object.entries(db.symptoms).map(([k, list]) => `
                <div class="card">
                    <h3>${k === 'physical' ? 'פיזי' : k === 'behavior' ? 'התנהגותי' : 'קומפולסיבי'} <button onclick="addSymp('${k}')" style="font-size:12px; border:none; background:#e8f5e9; color:var(--primary); border-radius:5px;">+</button></h3>
                    ${list.map((s, i) => `
                        <div class="item-row">
                            <span>${s}</span>
                            <div class="rating">
                                ${[1,2,3,4,5].map(n => `<div class="dot" onclick="setRate(this)">${n}</div>`).join('')}
                            </div>
                        </div>`).join('')}
                </div>`) + '<button class="btn-action">שמור נתוני היום ✅</button>';
        } 
        
        else if (tab === 'calendar') {
            const monthName = currDate.toLocaleString('he-IL', { month: 'long', year: 'numeric' });
            v.innerHTML = `
                <div class="card">
                    <div class="cal-header">
                        <button onclick="currDate.setMonth(currDate.getMonth()-1); show('calendar')"> הקודם </button>
                        <strong>${monthName}</strong>
                        <button onclick="currDate.setMonth(currDate.getMonth()+1); show('calendar')"> הבא </button>
                    </div>
                    <div class="cal-grid">
                        ${['א','ב','ג','ד','ה','ו','ש'].map(d=>`<div class="weekday">${d}</div>`).join('')}
                        ${Array.from({length: 31}, (_, i) => `<div class="day ${i+1 === new Date().getDate() && currDate.getMonth() === new Date().getMonth() ? 'today' : ''}" onclick="alert('אירועי יום ${i+1}')">${i+1}</div>`).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3>הוספת אירוע / סיכום</h3>
                    <textarea placeholder="מה היה היום?" style="width:100%; border:1px solid #eee; border-radius:10px; padding:10px;"></textarea>
                    <input type="file" multiple style="margin-top:10px;">
                    <button class="btn-action">שמור ביומן</button>
                </div>`;
        }
        
        else if (tab === 'meds') {
            v.innerHTML = `<div class="card"><h3>תרופות ותוספים</h3>${db.meds.map((m,i)=>`<div style="padding:10px; border-bottom:1px solid #eee;"><strong>${m.name}</strong> (${m.times})</div>`).join('')}<button class="btn-action" onclick="addMed()">+ הוסף תרופה</button></div>`;
        }

        else if (tab === 'more') {
            v.innerHTML = `
                <div class="card"><h3>סיכומים ומסמכים</h3><input type="file" id="fup" onchange="upDoc()" style="display:none"><button class="btn-action" onclick="document.getElementById('fup').click()">📤 העלאת מסמך</button><div>${db.docs.map(d=>`<div>📄 ${d}</div>`).join('')}</div></div>
                <div class="card"><h3>אנשי קשר</h3>${db.contacts.map(c=>`<div>${c.name}: ${c.phone}</div>`).join('')}<button class="btn-action" onclick="addCon()">+ הוסף איש קשר</button></div>
                <div class="card"><h3>אתרים</h3>${db.sites.map(s=>`<div><a href="${s.url}" target="_blank">${s.name}</a></div>`).join('')}<button class="btn-action" onclick="addSite()">+ הוסף אתר</button></div>`;
        }
        
        else if (tab === 'analysis') {
            v.innerHTML = `<div class="card"><h3>ניתוח נתונים</h3><div style="height:100px; display:flex; align-items:flex-end; gap:5px; background:#f9f9f9; padding:10px; border-radius:10px;">${Array.from({length:7}).map(()=>`<div style="flex:1; background:var(--primary); height:${20+Math.random()*80}%"></div>`).join('')}</div><button class="btn-action">הורד דוח CSV</button></div>`;
        }
    }

    function setRate(el) { el.parentElement.querySelectorAll('.dot').forEach(d=>d.classList.remove('active')); el.classList.add('active'); }
    function addSymp(k) { const n = prompt("שם:"); if(n){db.symptoms[k].push(n); save(); show('track');} }
    function addMed() { const n = prompt("שם:"); const t = prompt("שעות:"); if(n){db.meds.push({name:n, times:t}); save(); show('meds');} }
    function addCon() { const n = prompt("שם:"); const p = prompt("טלפון:"); if(n){db.contacts.push({name:n, phone:p}); save(); show('more');} }
    function addSite() { const n = prompt("שם:"); const u = prompt("URL:"); if(n){db.sites.push({name:n, url:u}); save(); show('more');} }
    function upDoc() { const f = document.getElementById('fup').files[0]; if(f){db.docs.push(f.name); save(); show('more');} }

    window.onload = () => show('track');
</script>
</body>
</html>
