<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P/P TRACKER 🌿</title>
    <style>
        :root { --primary: #4caf50; --bg: #f8faf7; --white: #ffffff; --text: #2d3436; }
        body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 18px; text-align: center; font-weight: bold; }
        .container { padding: 16px; max-width: 600px; margin: auto; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* יומן */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day { padding: 12px 0; background: #f9f9f9; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .day.selected { background: var(--primary); color: white; font-weight: bold; }
        .day.has-data::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #4caf50; border-radius: 50%; }
        
        .day-detail { display: none; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #eee; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 12px; padding: 12px; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; min-height: 80px; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-btn { border: none; background: none; font-size: 11px; color: #b0b0b0; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-google { background: #4285F4; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<header>P/P TRACKER 🌿</header>
<div class="container" id="view"></div>

<nav class="nav">
    <button class="nav-btn" onclick="show('track')">📊<span>מעקב</span></button>
    <button class="nav-btn" onclick="show('meds')">💊<span>תרופות</span></button>
    <button class="nav-btn active" onclick="show('calendar')">📅<span>יומן</span></button>
    <button class="nav-btn" onclick="show('analysis')">📈<span>ניתוח</span></button>
    <button class="nav-btn" onclick="show('more')">➕<span>עוד</span></button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('pp_final_v13')) || { 
        symptoms: { physical: ["נזלת", "חום", "כאבי בטן"], behavior: ["בכי", "זעם"], compulsive: ["טיקים"] },
        meds: [], logs: {}, calendarNotes: {} 
    };
    
    let currDate = new Date();
    function save() { localStorage.setItem('pp_final_v13', JSON.stringify(db)); }

    function show(tab) {
        const v = document.getElementById('view');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(event && event.currentTarget) event.currentTarget.classList.add('active');

        if (tab === 'calendar') {
            const mName = currDate.toLocaleString('he-IL', { month: 'long', year: 'numeric' });
            v.innerHTML = `
                <button class="btn-google" onclick="alert('מתחבר ל-Google Calendar...')">🗓️ סנכרן עם יומן גוגל</button>
                <div class="card">
                    <div class="cal-header">
                        <button onclick="changeMonth(-1)"> < </button>
                        <strong>${mName}</strong>
                        <button onclick="changeMonth(1)"> > </button>
                    </div>
                    <div class="cal-grid">
                        ${['א','ב','ג','ד','ה','ו','ש'].map(d=>`<div style="font-size:12px; color:#aaa; margin-bottom:5px;">${d}</div>`).join('')}
                        ${generateDays()}
                    </div>
                    <div id="day-box" class="day-detail">
                        <h4 id="selected-label" style="margin:0 0 10px 0; color:var(--primary);">בחר תאריך</h4>
                        <textarea id="day-note" placeholder="כתבי כאן הערות, סיכום יום או אירועים מיוחדים..."></textarea>
                        <div style="display:flex; gap:10px;">
                            <input type="file" id="day-file" style="display:none" onchange="fileUploaded()">
                            <button class="btn-action" style="background:#666; margin:0;" onclick="document.getElementById('day-file').click()">📎 הוספת קובץ</button>
                            <button class="btn-action" style="margin:0;" onclick="saveDay()">שמור יום</button>
                        </div>
                        <div id="file-list" style="margin-top:10px; font-size:12px; color:#666;"></div>
                    </div>
                </div>`;
        } else {
            v.innerHTML = `<div class="card"><h3>${tab}</h3><p>חזרי ללשונית היומן לבדיקה.</p></div>`;
        }
    }

    function generateDays() {
        let days = '';
        for(let i=1; i<=31; i++) {
            const dateKey = `${currDate.getFullYear()}-${currDate.getMonth()+1}-${i}`;
            const hasData = db.calendarNotes[dateKey] ? 'has-data' : '';
            days += `<div class="day ${hasData}" onclick="selectDay(this, ${i})">${i}</div>`;
        }
        return days;
    }

    function changeMonth(n) {
        currDate.setMonth(currDate.getMonth() + n);
        show('calendar');
    }

    let activeDayKey = '';
    function selectDay(el, day) {
        document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
        activeDayKey = `${currDate.getFullYear()}-${currDate.getMonth()+1}-${day}`;
        
        document.getElementById('day-box').style.display = 'block';
        document.getElementById('selected-label').innerText = `תאריך: ${day}/${currDate.getMonth()+1}`;
        document.getElementById('day-note').value = db.calendarNotes[activeDayKey] || '';
    }

    function saveDay() {
        if(!activeDayKey) return;
        db.calendarNotes[activeDayKey] = document.getElementById('day-note').value;
        save();
        alert('הערה נשמרה בהצלחה!');
        show('calendar');
    }

    function fileUploaded() {
        alert('הקובץ נבחר ומוכן לשמירה (בגרסת הענן הוא יישמר ב-Drive)');
    }

    window.onload = () => show('calendar');
</script>
</body>
</html>
