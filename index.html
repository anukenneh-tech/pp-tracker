<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P/P TRACKER 🌿</title>
    <style>
        :root { --primary: #4caf50; --bg: #f8faf7; --white: #ffffff; --text: #2d3436; --shadow: rgba(0,0,0,0.06); }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        header { background: var(--primary); color: white; padding: 18px; text-align: center; font-weight: bold; font-size: 1.3rem; box-shadow: 0 2px 10px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .container { padding: 16px; max-width: 600px; margin: auto; }
        
        .card { background: var(--white); border-radius: 24px; padding: 20px; margin-bottom: 18px; box-shadow: 0 4px 20px var(--shadow); border: 1px solid rgba(0,0,0,0.02); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #f1f8e9; padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; }
        
        .item-row { display: flex; flex-direction: column; padding: 14px 0; border-bottom: 1px solid #f5f5f5; }
        .item-row:last-child { border-bottom: none; }
        .item-label { font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 1rem; }
        
        .rating { display: flex; justify-content: space-between; gap: 6px; }
        .dot { flex: 1; height: 42px; border: 1px solid #e0e0e0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: #fff; color: #777; }
        .dot.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(76, 175, 80, 0.25); transform: translateY(-2px); font-weight: bold; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.98); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; height: 75px; }
        .nav-btn { border: none; background: none; font-size: 11px; color: #b0b0b0; display: flex; flex-direction: column; align-items: center; transition: 0.3s; width: 20%; padding-top: 5px; }
        .nav-btn span { font-size: 22px; margin-bottom: 4px; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: bold; font-size: 17px; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2); }
        .btn-add-mini { font-size: 12px; background: #e8f5e9; border: none; color: var(--primary); padding: 6px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .edit-tool { font-size: 14px; color: #ddd; margin-left: 8px; cursor: pointer; }
    </style>
</head>
<body>

<header>P/P TRACKER 🌿</header>
<div class="container" id="view"></div>

<nav class="nav">
    <button class="nav-btn active" onclick="show('track')"><span>📊</span>מעקב</button>
    <button class="nav-btn" onclick="show('meds')"><span>💊</span>תרופות</button>
    <button class="nav-btn" onclick="show('calendar')"><span>📅</span>יומן</button>
    <button class="nav-btn" onclick="show('analysis')"><span>📈</span>ניתוח</button>
    <button class="nav-btn" onclick="show('more')"><span>➕</span>עוד</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('pp_final_v9')) || {
        symptoms: {
            physical: ["נזלת", "חום", "כאב רגליים", "כאבי בטן", "כאבי ראש", "כאב גרון", "שיעול", "הליכה רוקעת", "עייפות", "הרחבת אישונים", "אחיזת עפרון רפה", "הרטבת לילה", "יקיצות מרובות", "קושי להירדם"],
            behavior: ["בכי", "התפרצויות זעם", "מתחצפת ומקללת", "מופנמת", "תסכול וכעס", "שצף דיבור", "חוסר ריכוז", "ערפול מוחי", "צחוק היסטרי"],
            compulsive: ["הרמת גבות", "משיכת אף", "כחכוח גרון", "גירוד והרחה", "הקפצת גוף", "משיכת כתפיים/צוואר", "סידור שיער", "סידור שמיכה", "סידור כרית", "סידור סדין", "סידור נעליים", "עניין עם בגדים"]
        },
        meds: [], contacts: [], sites: [], docs: [], logs: {}
    };

    let currDate = new Date();
    function save() { localStorage.setItem('pp_final_v9', JSON.stringify(db)); }

    function show(tab) {
        const v = document.getElementById('view');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(event && event.currentTarget.classList) event.currentTarget.classList.add('active');

        if (tab === 'track') {
            v.innerHTML = Object.entries(db.symptoms).map(([k, list]) => `
                <div class="card">
                    <h3>${k === 'physical' ? 'תסמינים פיזיים' : k === 'behavior' ? 'נפשי והתנהגותי' : 'קומפולסיבי וטיקים'} 
                        <button class="btn-add-mini" onclick="addSymp('${k}')">הוסף +</button>
                    </h3>
                    ${list.map((s, i) => `
                        <div class="item-row">
                            <div class="item-label">
                                <span>${s} <span class="edit-tool" onclick="delSymp('${k}',${i})">🗑️</span></span>
                            </div>
                            <div class="rating">
                                ${[1,2,3,4,5].map(n => `<div class="dot" onclick="setRate(this)">${n}</div>`).join('')}
                            </div>
                        </div>`).join('')}
                </div>`).join('') + '<button class="btn-action">שמור נתונים ✅</button>';
        } 
        else if (tab === 'calendar') {
            const mName = currDate.toLocaleString('he-IL', { month: 'long', year: 'numeric' });
            v.innerHTML = `
                <div class="card">
                    <div class="cal-header">
                        <button onclick="currDate.setMonth(currDate.getMonth()-1); show('calendar')"> < </button>
                        <strong>${mName}</strong>
                        <button onclick="currDate.setMonth(currDate.getMonth()+1); show('calendar')"> > </button>
                    </div>
                    <div class="cal-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:6px;">
                        ${['א','ב','ג','ד','ה','ו','ש'].map(d=>`<div style="font-size:12px; color:#aaa; margin-bottom:5px;">${d}</div>`).join('')}
                        ${Array.from({length:31}, (_,i)=>`<div class="day" style="padding:12px 0; background:#f9f9f9; border-radius:12px; text-align:center; font-size:14px;">${i+1}</div>`).join('')}
                    </div>
                </div>`;
        }
        else if (tab === 'meds') {
            v.innerHTML = `<div class="card"><h3>תרופות ותזכורות</h3>${db.meds.map((m,i)=>`<div style="padding:15px; background:#f9f9f9; border-radius:15px; margin-bottom:10px;"><strong>${m.name}</strong> (${m.times})</div>`).join('')}<button class="btn-action" onclick="addMed()">+ הוסף תרופה</button></div>`;
        }
        else if (tab === 'more') {
            v.innerHTML = `
                <div class="card"><h3>מידע מקצועי</h3><p>🔗 <a href="https://pans.org.il" target="_blank" style="color:var(--primary); text-decoration:none; font-weight:bold;">עמותת פאנס ישראל</a></p></div>
                <div class="card"><h3>סיכומים ומסמכים</h3><input type="file" id="fup" onchange="upDoc(this)" style="display:none"><button class="btn-action" onclick="document.getElementById('fup').click()">📤 העלאת מסמך</button></div>`;
        }
        else if (tab === 'analysis') {
            v.innerHTML = `<div class="card"><h3>ניתוח נתונים</h3><div style="height:120px; background:#fdfdfd; border-radius:20px; display:flex; align-items:flex-end; gap:8px; padding:15px; border:1px solid #f0f0f0;">${Array.from({length:7}).map(()=>`<div style="flex:1; background:linear-gradient(to top, var(--primary), #81c784); border-radius:6px; height:${30 + Math.random()*70}%"></div>`).join('')}</div><button class="btn-action">📊 הורד דוח לרופא</button></div>`;
        }
    }

    function setRate(el) { el.parentElement.querySelectorAll('.dot').forEach(d=>d.classList.remove('active')); el.classList.add('active'); }
    function addSymp(k) { const n = prompt("שם התופעה:"); if(n){db.symptoms[k].push(n); save(); show('track');} }
    function delSymp(k, i) { if(confirm("למחוק את התופעה?")){db.symptoms[k].splice(i,1); save(); show('track');} }
    function addMed() { const n = prompt("שם:"); const t = prompt("שעות:"); if(n){db.meds.push({name:n, times:t}); save(); show('meds');} }
    function upDoc(input) { if(input.files[0]){db.docs.push(input.files[0].name); save(); show('more');} }

    window.onload = () => show('track');
</script>
</body>
</html>
