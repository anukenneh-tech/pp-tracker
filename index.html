<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P/P Tracker Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #4caf50; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .status { margin-top: 20px; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="card">
        <h1>בדיקת תקינות אפליקציה</h1>
        <p>לחצי על הכפתור כדי לראות אם הקוד עובד:</p>
        <button onclick="testApp()">לחצי כאן</button>
        <div id="result" class="status"></div>
    </div>

    <script>
        function testApp() {
            console.log("Button clicked!");
            document.getElementById('result').innerText = "מעולה! הלחצנים עובדים. אפשר להמשיך.";
            alert("הכל תקין! המערכת מגיבה.");
        }
    </script>
</body>
</html>
