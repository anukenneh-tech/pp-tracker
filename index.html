<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P/P TRACKER 🌿</title>
    <style>
        :root { --primary: #4caf50; --bg: #f8faf7; --white: #ffffff; --text: #2d3436; --shadow: rgba(0,0,0,0.06); }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 18px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px var(--shadow); }
        .container { padding: 16px; max-width: 600px; margin: auto; }
        .card { background: var(--white); border-radius: 20px; padding: 18px; margin-bottom: 18px; box-shadow: 0 4px 20px var(--shadow); }
        h3 { margin: 0 0 15px 0; color: var(--primary); border-bottom: 2px solid #f1f8e9; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-row { display: flex; flex-direction: column; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .rating { display: flex; justify-content: space-between; gap: 6px; margin-top: 8px; }
        .dot { flex: 1; height: 38px; border: 1px solid #e0e0e0; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #fff; cursor: pointer; }
        .dot.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-btn { border: none; background: none; font-size: 11px; color: #b0b0b0; display: flex; flex-direction: column; align-items: center; width: 20%; cursor: pointer; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day { padding: 10px 0; background: #f9f9f9; border-radius: 10px; text-align: center; cursor: pointer; position: relative; }
        .day.selected { background: var(--primary); color: white; }
        .list-item { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header>P/P TRACKER 🌿</header>
<div class="container" id="view"></div>

<nav class="nav">
    <button class="nav-btn active" onclick="show('track')"><span>📊</span>מעקב</button>
    <button class="nav-btn" onclick="show('meds')"><span>💊</span>תרופות</button>
    <button class="nav-btn" onclick="show('calendar')"><span>📅</span>יומן</button>
    <button class="nav-btn" onclick="show('analysis')"><span>📈</span>ניתוח</button>
    <button class="nav-btn" onclick="show('more')"><span>➕</span>עוד</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('pp_final_v11')) || {
        symptoms: {
            physical: ["נזלת", "חום", "כאב רגליים", "כאבי בטן", "כאבי ראש", "כאב גרון", "שיעול", "הליכה רוקעת", "עייפות", "הרחבת אישונים", "אחיזת עפרון רפה", "הרטבת לילה", "יקיצות מרובות", "קושי להירדם"],
            behavior: ["בכי", "התפרצויות זעם", "מתחצפת ומקללת", "מופנמת", "תסכול וכעס", "שצף דיבור", "חוסר ריכוז", "ערפול מוחי", "צחוק היסטרי"],
            compulsive: ["הרמת גבות", "משיכת אף", "כחכוח גרון", "גירוד והרחה", "הקפצת גוף", "משיכת כתפיים/צוואר", "סידור שיער", "סידור שמיכה", "סידור כרית", "סידור סדין", "סידור נעליים", "עניין עם בגדים"]
        },
        meds: [], contacts: [], sites: [], docs: [], logs: {}
    };

    let currDate = new Date();
    function save() { localStorage.setItem('pp_final_v11', JSON.stringify(db)); }

    function show(tab) {
        const v = document.getElementById('view');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(event && event.currentTarget.classList) event.currentTarget.classList.add('active');

        if (tab === 'track') {
            v.innerHTML = Object.entries(db.symptoms).map(([k, list]) => `
                <div class="card">
                    <h3>${k === 'physical' ? 'פיזי' : k === 'behavior' ? 'נפשי' : 'טיקים'} <button onclick="addSymp('${k}')" style="border:none; background:#e8f5e9; color:var(--primary);">+</button></h3>
                    ${list.map((s, i) => `
                        <div class="item-row">
                            <div style="display:flex; justify-content:space-between">
                                <span>${s}</span>
                                <span style="color:#ccc; font-size:12px;" onclick="delSymp('${k}',${i})">🗑️</span>
                            </div>
                            <div class="rating">${[1,2,3,4,5].map(n => `<div class="dot" onclick="setRate(this)">${n}</div>`).join('')}</div>
                        </div>`).join('')}
                </div>`) + '<button class="btn-action">שמור נתוני היום ✅</button>';
        } 
        else if (tab === 'calendar') {
            const mName = currDate.toLocaleString('he-IL', { month: 'long', year: 'numeric' });
            v.innerHTML = `
                <button class="btn-action" style="background:#4285F4; margin-bottom:15px;">🗓️ סנכרן עם Google Calendar</button>
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <button onclick="currDate.setMonth(currDate.getMonth()-1); show('calendar')"> < </button>
                        <strong>${mName}</strong>
                        <button onclick="currDate.setMonth(currDate.getMonth()+1); show('calendar')"> > </button>
                    </div>
                    <div class="cal-grid">
                        ${['א','ב','ג','ד','ה','ו','ש'].map(d=>`<div style="font-size:12px; color:#aaa;">${d}</div>`).join('')}
                        ${Array.from({length:31}, (_,i)=>`<div class="day" onclick="this.classList.toggle('selected')">${i+1}</div>`).join('')}
                    </div>
                    <textarea placeholder="הערות ליום שנבחר..." style="width:100%; margin-top:15px; border-radius:10px; padding:10px; border:1px solid #eee;"></textarea>
                    <input type="file" multiple style="margin-top:10px;">
                    <button class="btn-action">שמור ביומן</button>
                </div>`;
        }
        else if (tab === 'meds') {
            v.innerHTML = `<div class="card"><h3>תרופות ותזכורות</h3>${db.meds.map((m,i)=>`<div class="list-item"><strong>${m.name}</strong> (${m.times})<span onclick="del('meds',${i})">🗑️</span></div>`).join('')}<button class="btn-action" onclick="addMed()">+ הוסף תרופה</button></div>`;
        }
        else if (tab === 'more') {
            v.innerHTML = `
                <div class="card"><h3>מידע מקצועי</h3><p>🔗 <a href="https://panspandasil.org/" target="_blank" style="color:var(--primary); font-weight:bold;">עמותת פאנס פנדס ישראל</a></p></div>
                <div class="card"><h3>סיכומים ומסמכים</h3><input type="file" id="fup" onchange="upDoc(this)" style="display:none"><button class="btn-action" onclick="document.getElementById('fup').click()">📤 העלאת מסמך</button><div>${db.docs.map((d,i)=>`<div class="list-item">📄 ${d}<span onclick="del('docs',${i})">🗑️</span></div>`).join('')}</div></div>
                <div class="card"><h3>אנשי קשר</h3>${db.contacts.map((c,i)=>`<div class="list-item">${c.name}: ${c.phone}<span onclick="del('contacts',${i})">🗑️</span></div>`).join('')}<button class="btn-action" onclick="addCon()">+ הוסף איש קשר</button></div>
                <div class="card"><h3>אתרים נוספים</h3>${db.sites.map((s,i)=>`<div class="list-item"><a href="${s.url}" target="_blank">${s.name}</a><span onclick="del('sites',${i})">🗑️</span></div>`).join('')}<button class="btn-action" onclick="addSite()">+ הוסף אתר</button></div>`;
        }
        else if (tab === 'analysis') {
            v.innerHTML = `<div class="card"><h3>ניתוח נתונים</h3><div style="height:100px; background:#f9f9f9; border-radius:15px; display:flex; align-items:flex-end; gap:8px; padding:10px; border:1px solid #eee;">${Array.from({length:7}).map(()=>`<div style="flex:1; background:var(--primary); height:${30+Math.random()*70}%"></div>`).join('')}</div><button class="btn-action">📊 הורד דוח לרופא (CSV)</button></div>`;
        }
    }

    function setRate(el) { el.parentElement.querySelectorAll('.dot').forEach(d=>d.classList.remove('active')); el.classList.add('active'); }
    function addSymp(k) { const n = prompt("שם:"); if(n){db.symptoms[k].push(n); save(); show('track');} }
    function delSymp(k, i) { if(confirm("למחוק?")){db.symptoms[k].splice(i,1); save(); show('track');} }
    function addMed() { const n = prompt("שם:"); const t = prompt("שעות:"); if(n){db.meds.push({name:n, times:t}); save(); show('meds');} }
    function addCon() { const n = prompt("שם:"); const p = prompt("טלפון:"); if(n){db.contacts.push({name:n, phone:p}); save(); show('more');} }
    function addSite() { const n = prompt("שם:"); const u = prompt("URL:"); if(n){db.sites.push({name:n, url:u}); save(); show('more');} }
    function upDoc(input) { if(input.files[0]){db.docs.push(input.files[0].name); save(); show('more');} }
    function del(t, i) { if(confirm("למחוק?")){db[t].splice(i,1); save(); show(t==='meds'?'meds':'more');} }

    window.onload = () => show('track');
</script>
</body>
</html>
